- type: entity
  parent: BaseItem
  id: ADTBaseBolt
  abstract: true
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: ADT/Objects/Weapons/Guns/Projectiles/bolt.rsi
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeCircle
          radius: 0.2
        density: 5
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.3,0.1,-0.1"
        hard: false
        mask:
        - Impassable
        - BulletImpassable
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
    embedOnThrow: false
  - type: ThrowingAngle
    angle: 0
  - type: Ammo
    muzzleFlash: null
  - type: Tag
    tags:
    - ADTBolt
  - type: Projectile
    deleteOnCollide: false
    onlyCollideWhenShot: true
    damage:
      types:
        Blunt: 12.5
        Piercing: 12.5
  - type: SolutionContainerManager
    solutions:
      ammo:
        maxVol: 2
  - type: RefillableSolution
    solution: ammo
  - type: InjectableSolution
    solution: ammo
  - type: SolutionInjectOnEmbed
    transferAmount: 2
    solution: ammo
  - type: SolutionTransfer
    maxTransferAmount: 2
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    fillBaseName: solution

- type: entity
  parent: ADTBaseBolt
  id: ADTBoltRegular
  name: bolt
  description: You can feel the power of the steppe within you.
  components:
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-tail
        color: "#a40000FF"
      - state: inhand-left-rod
        color: "#a77e5cFF"
      - state: inhand-left-tip
        color: "#8c8c8cFF"
      right:
      - state: inhand-right-tail
        color: "#a40000FF"
      - state: inhand-right-rod
        color: "#a77e5cFF"
      - state: inhand-right-tip
        color: "#8c8c8cFF"
  - type: Sprite
    layers:
    - state: tail
      color: "#a40000FF"
    - state: rod
      color: "#a77e5cFF"
    - state: tip
      color: "#8c8c8cFF"
    - state: solution1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: Projectile
    damage:
      types:
        Blunt: 17.5
        Piercing: 17.5

