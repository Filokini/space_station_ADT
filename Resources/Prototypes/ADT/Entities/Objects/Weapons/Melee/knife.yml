- type: entity
  parent: BaseItem
  id: ADTWeaponAxeImprovised
  name: improvised axe
  components:
  - type: Sprite
    sprite: ADT/Objects/Weapons/Melee/improvised_axe.rsi
    state: icon
  - type: Item
    sprite: ADT/Objects/Weapons/Melee/improvised_axe.rsi
    storedOffset: -3,-2
    storedRotation: -45
  - type: Utensil
    types:
      - Knife
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Slash: 12
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 15
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
  - type: DisarmMalus
    malus: 0.225
  - type: Tool
    qualities:
      - Slicing
    useSound:
      path: /Audio/Items/Culinary/chop.ogg
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          vertices:
          - 0.21875,0.25
          - 0.03125,0.09375
          - 0.21875,-0.21875
          - 0.53125,0.09375
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: Construction
    graph: ADTWeaponAxeImprovised
    node: axe
