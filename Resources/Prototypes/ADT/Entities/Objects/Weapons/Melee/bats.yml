- type: entity
  name: tactic bat
  parent: BaseItem
  id: ADTTacticBat
  description: Upgraded verion of telescopic baton.
  components:
  - type: Sprite
    sprite: ADT/Objects/Weapons/Melee/tactic_bat.rsi
    layers:
    - state: bat_off
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: SwitchableWeapon
    openSound: "/Audio/ADT/Entities/Objects/Weapons/Melee/open_telescopichka.ogg"
    closeSound: "/Audio/ADT/Entities/Objects/Weapons/Melee/close_telescopichka.ogg"
    damageOpen:
      types:
        Blunt: 20
    damageFolded:
      types:
        Blunt: 0
    sizeOpened: Normal
    sizeClosed: Small
  - type: MeleeWeapon
    soundHit: "/Audio/ADT/Weapons/Melee/bat.ogg"
    damage:
      types:
        Blunt: 2.4
  - type: Item
    size: Small
    sprite: ADT/Objects/Weapons/Melee/tactic_bat.rsi
  - type: UseDelay
    delay: 1.0
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: bat_on}
          False: {state: bat_off}
  - type: MeleeThrowOnHit
    speed: 20
    distance: 1
  - type: StealTarget
    stealGroup: ADTHosWeapon

- type: entity
  parent: BaseBallBat
  id: ADTBaseBallBatNails
  name: baseball bat with nails
  components:
  - type: Sprite
    sprite: ADT/Objects/Weapons/Melee/nails_bat.rsi
    state: icon
  - type: Item
    size: Normal
    shape:
    - 0,0,1,3
    storedSprite:
      state: storage
      sprite: ADT/Objects/Weapons/Melee/nails_bat.rsi
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 10
        Piercing: 2.5
        Structural: 5
    soundHit:
      collection: MetalThud
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 5
        Piercing: 2.5
        Structural: 5
  - type: Construction
    graph: ADTBaseBallBatNails
    node: nailsbat
