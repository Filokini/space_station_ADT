# Demon appearance + visual organs (upstream PR#42476). parts.rsi sexed; internals reused from Human.
# markingsGroup "Demon" defined in ADT/Body/markingsGroups.yml

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceDemon
  categories: [ HideSpawnMenu ]
  name: demon appearance
  components:
  - type: InitialBody
    organs:
      Torso: ADTOrganDemonTorso
      Head: ADTOrganDemonHead
      ArmLeft: ADTOrganDemonArmLeft
      ArmRight: ADTOrganDemonArmRight
      HandRight: ADTOrganDemonHandRight
      HandLeft: ADTOrganDemonHandLeft
      LegLeft: ADTOrganDemonLegLeft
      LegRight: ADTOrganDemonLegRight
      FootLeft: ADTOrganDemonFootLeft
      FootRight: ADTOrganDemonFootRight
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Appendix: OrganHumanAppendix
      Ears: OrganHumanEars
      Lungs: OrganHumanLungs
      Heart: ADTOrganDemonHeart
      Stomach: ADTOrganDemonStomach
      Liver: OrganAnimalLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: DemonSpecies
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: ADT/Mobs/Species/Demon/displacement.rsi
            state: jumpsuit-female

- type: entity
  parent: OrganBaseOrganic
  id: ADTOrganDemon
  abstract: true
  suffix: demon

- type: entity
  id: ADTOrganDemonMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Human, Demon ]

- type: entity
  id: ADTOrganDemonVisual
  abstract: true
  components:
  - type: VisualOrgan
    data:
      sprite: ADT/Mobs/Species/Demon/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Demon

- type: entity
  parent: [ ADTOrganDemon, ADTOrganDemonVisual ]
  id: ADTOrganDemonExternal
  abstract: true
  components:
  - type: Sprite
    sprite: ADT/Mobs/Species/Demon/parts.rsi

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, ADTOrganDemonExternal ]
  id: ADTOrganDemonTorso

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, ADTOrganDemonExternal ]
  id: ADTOrganDemonHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.Snout
    - enum.HumanoidVisualLayers.SnoutOverlay
    - enum.HumanoidVisualLayers.HeadTop
    - enum.HumanoidVisualLayers.HeadSide

- type: entity
  parent: [ OrganBaseArmLeft, ADTOrganDemonExternal ]
  id: ADTOrganDemonArmLeft

- type: entity
  parent: [ OrganBaseArmRight, ADTOrganDemonExternal ]
  id: ADTOrganDemonArmRight

- type: entity
  parent: [ OrganBaseHandLeft, ADTOrganDemonExternal ]
  id: ADTOrganDemonHandLeft

- type: entity
  parent: [ OrganBaseHandRight, ADTOrganDemonExternal ]
  id: ADTOrganDemonHandRight

- type: entity
  parent: [ OrganBaseLegLeft, ADTOrganDemonExternal ]
  id: ADTOrganDemonLegLeft

- type: entity
  parent: [ OrganBaseLegRight, ADTOrganDemonExternal ]
  id: ADTOrganDemonLegRight

- type: entity
  parent: [ OrganBaseFootLeft, ADTOrganDemonExternal ]
  id: ADTOrganDemonFootLeft

- type: entity
  parent: [ OrganBaseFootRight, ADTOrganDemonExternal ]
  id: ADTOrganDemonFootRight

- type: entity
  parent: [ OrganBaseStomach, ADTOrganDemonMetabolizer, OrganSpriteHumanInternal ]
  id: ADTOrganDemonStomach

- type: entity
  parent: [ OrganBaseHeart, ADTOrganDemonMetabolizer, OrganSpriteHumanInternal ]
  id: ADTOrganDemonHeart

