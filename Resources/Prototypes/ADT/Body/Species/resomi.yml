# Resomi appearance + visual organs (upstream PR#42476). parts.rsi sexed; internals reused from Human.
# markingsGroup "Resomi" defined in ADT/Body/markingsGroups.yml

- type: entity
  parent: BaseSpeciesAppearance
  id: ADTAppearanceResomi
  categories: [ HideSpawnMenu ]
  name: resomi appearance
  components:
  - type: InitialBody
    organs:
      Torso: ADTOrganResomiTorso
      Head: ADTOrganResomiHead
      ArmLeft: ADTOrganResomiArmLeft
      ArmRight: ADTOrganResomiArmRight
      HandRight: ADTOrganResomiHandRight
      HandLeft: ADTOrganResomiHandLeft
      LegLeft: ADTOrganResomiLegLeft
      LegRight: ADTOrganResomiLegRight
      FootLeft: ADTOrganResomiFootLeft
      FootRight: ADTOrganResomiFootRight
      Brain: ADTOrganResomiBrain
      Eyes: ADTOrganResomiEyes
      Tongue: ADTOrganResomiTongue
      Appendix: ADTOrganResomiAppendix
      Ears: ADTOrganResomiEars
      Lungs: ADTOrganResomiLungs
      Heart: ADTOrganResomiHeart
      Stomach: ADTOrganResomiStomach
      Liver: ADTOrganResomiLiver
      Kidneys: ADTOrganResomiKidneys
  - type: HumanoidProfile
    species: Resomi
  - type: Hands
    inHandItemScale: 0.85, 0.85
    leftHandDisplacement:
      sizeMaps:
        32:
          sprite: ADT/Mobs/Species/Resomi/displacement.rsi
          state: inHand
    rightHandDisplacement:
      sizeMaps:
        32:
          sprite: ADT/Mobs/Species/Resomi/displacement.rsi
          state: inHand
  - type: Inventory
    speciesId: resomi
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: ADT/Mobs/Species/Resomi/displacement.rsi
            state: jumpsuit
      outerClothing:
        sizeMaps:
          32:
            sprite: ADT/Mobs/Species/Resomi/displacement.rsi
            state: jumpsuit
      eyes:
        sizeMaps:
          32:
            sprite: ADT/Mobs/Species/Resomi/displacement.rsi
            state: eyes
      gloves:
        sizeMaps:
          32:
            sprite: ADT/Mobs/Species/Resomi/displacement.rsi
            state: hands
      head:
        sizeMaps:
          32:
            sprite: ADT/Mobs/Species/Resomi/displacement.rsi
            state: head
      back:
        sizeMaps:
          32:
            sprite: ADT/Mobs/Species/Resomi/displacement.rsi
            state: back
      ears:
        sizeMaps:
          32:
            sprite: ADT/Mobs/Species/Resomi/displacement.rsi
            state: ears
      shoes:
        sizeMaps:
          32:
            sprite: ADT/Mobs/Species/Resomi/displacement.rsi
            state: feet
      neck:
        sizeMaps:
          32:
            sprite: ADT/Mobs/Species/Resomi/displacement.rsi
            state: neck
      mask:
        sizeMaps:
          32:
            sprite: ADT/Mobs/Species/Resomi/displacement.rsi
            state: mask
      suitstorage:
        sizeMaps:
          32:
            sprite: ADT/Mobs/Species/Resomi/displacement.rsi
            state: suitStorage
      belt:
        sizeMaps:
          32:
            sprite: ADT/Mobs/Species/Resomi/displacement.rsi
            state: belt

- type: entity
  parent: OrganBaseOrganic
  id: ADTOrganResomi
  abstract: true
  suffix: resomi

- type: entity
  id: ADTOrganResomiMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Animal ]

- type: entity
  id: ADTOrganResomiVisual
  abstract: true
  components:
  - type: VisualOrgan
    data:
      sprite: ADT/Mobs/Species/Resomi/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Resomi

- type: entity
  id: ADTOrganResomiInternal
  abstract: true
  components:
  - type: Sprite
    sprite: ADT/Mobs/Species/Resomi/organs.rsi

- type: entity
  parent: [ ADTOrganResomi, ADTOrganResomiVisual ]
  id: ADTOrganResomiExternal
  abstract: true
  components:
  - type: Sprite
    sprite: ADT/Mobs/Species/Resomi/parts.rsi

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, ADTOrganResomiExternal ]
  id: ADTOrganResomiTorso

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, ADTOrganResomiExternal ]
  id: ADTOrganResomiHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.Snout
    - enum.HumanoidVisualLayers.SnoutOverlay
    - enum.HumanoidVisualLayers.HeadTop
    - enum.HumanoidVisualLayers.HeadSide

- type: entity
  parent: [ OrganBaseArmLeft, ADTOrganResomiExternal ]
  id: ADTOrganResomiArmLeft

- type: entity
  parent: [ OrganBaseArmRight, ADTOrganResomiExternal ]
  id: ADTOrganResomiArmRight

- type: entity
  parent: [ OrganBaseHandLeft, ADTOrganResomiExternal ]
  id: ADTOrganResomiHandLeft

- type: entity
  parent: [ OrganBaseHandRight, ADTOrganResomiExternal ]
  id: ADTOrganResomiHandRight

- type: entity
  parent: [ OrganBaseLegLeft, ADTOrganResomiExternal ]
  id: ADTOrganResomiLegLeft

- type: entity
  parent: [ OrganBaseLegRight, ADTOrganResomiExternal ]
  id: ADTOrganResomiLegRight

- type: entity
  parent: [ OrganBaseFootLeft, ADTOrganResomiExternal ]
  id: ADTOrganResomiFootLeft

- type: entity
  parent: [ OrganBaseFootRight, ADTOrganResomiExternal ]
  id: ADTOrganResomiFootRight

- type: entity
  parent: [ OrganBaseBrain, ADTOrganResomiInternal ]
  id: ADTOrganResomiBrain

- type: entity
  parent: [ OrganBaseTongue, OrganSpriteHumanInternal ]
  id: ADTOrganResomiTongue

- type: entity
  parent: [ OrganBaseAppendix, OrganSpriteHumanInternal ]
  id: ADTOrganResomiAppendix

- type: entity
  parent: [ OrganBaseEars, OrganSpriteHumanInternal ]
  id: ADTOrganResomiEars

- type: entity
  parent: [ OrganBaseLungs, ADTOrganResomiInternal, ADTOrganResomiMetabolizer ]
  id: ADTOrganResomiLungs

- type: entity
  parent: [ OrganBaseHeart, ADTOrganResomiInternal, ADTOrganResomiMetabolizer ]
  id: ADTOrganResomiHeart

- type: entity
  parent: [ OrganBaseStomach, ADTOrganResomiInternal, ADTOrganResomiMetabolizer ]
  id: ADTOrganResomiStomach

- type: entity
  parent: [ OrganBaseLiver, ADTOrganResomiInternal, ADTOrganResomiMetabolizer ]
  id: ADTOrganResomiLiver

- type: entity
  parent: [ OrganBaseKidneys, ADTOrganResomiInternal, ADTOrganResomiMetabolizer ]
  id: ADTOrganResomiKidneys

- type: entity
  parent: [ ADTOrganResomiVisual, OrganBaseEyes, ADTOrganResomiInternal ]
  id: ADTOrganResomiEyes
  components:
  - type: VisualOrgan
    data:
      sprite: ADT/Mobs/Customization/Resomi/eyes.rsi
      state: resomi
