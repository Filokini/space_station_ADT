# Ursus appearance + visual organs (upstream PR#42476). parts.rsi only (sexed); internals reused from Human.
# markingsGroup "Ursus" defined in ADT/Body/markingsGroups.yml

- type: entity
  parent: BaseSpeciesAppearance
  id: ADTAppearanceUrsus
  categories: [ HideSpawnMenu ]
  name: ursus appearance
  components:
  - type: InitialBody
    organs:
      Torso: ADTOrganUrsusTorso
      Head: ADTOrganUrsusHead
      ArmLeft: ADTOrganUrsusArmLeft
      ArmRight: ADTOrganUrsusArmRight
      HandRight: ADTOrganUrsusHandRight
      HandLeft: ADTOrganUrsusHandLeft
      LegLeft: ADTOrganUrsusLegLeft
      LegRight: ADTOrganUrsusLegRight
      FootLeft: ADTOrganUrsusFootLeft
      FootRight: ADTOrganUrsusFootRight
      Brain: ADTOrganUrsusBrain
      Eyes: ADTOrganUrsusEyes
      Tongue: ADTOrganUrsusTongue
      Appendix: ADTOrganUrsusAppendix
      Ears: ADTOrganUrsusEars
      Lungs: ADTOrganUrsusLungs
      Heart: ADTOrganUrsusHeart
      Stomach: ADTOrganUrsusStomach
      Liver: ADTOrganUrsusLiver
      Kidneys: ADTOrganUrsusKidneys
  - type: HumanoidProfile
    species: UrsusSpecies
  - type: ScaleVisuals
    scale: 1.03, 1.03
  - type: Inventory
    speciesId: urs
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female

- type: entity
  parent: OrganBaseOrganic
  id: ADTOrganUrsus
  abstract: true
  suffix: ursus

- type: entity
  parent: ADTOrganUrsus
  id: ADTOrganUrsusInternal
  abstract: true
  components:
  - type: Sprite
    sprite: ADT/Mobs/Species/Ursus/organs.rsi

- type: entity
  id: ADTOrganUrsusMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Animal ]

- type: entity
  id: ADTOrganUrsusVisual
  abstract: true
  components:
  - type: VisualOrgan
    data:
      sprite: ADT/Mobs/Species/Ursus/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Ursus

- type: entity
  parent: [ ADTOrganUrsus, ADTOrganUrsusVisual ]
  id: ADTOrganUrsusExternal
  abstract: true
  components:
  - type: Sprite
    sprite: ADT/Mobs/Species/Ursus/parts.rsi

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, ADTOrganUrsusExternal ]
  id: ADTOrganUrsusTorso

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, ADTOrganUrsusExternal ]
  id: ADTOrganUrsusHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.Snout
    - enum.HumanoidVisualLayers.HeadTop
    - enum.HumanoidVisualLayers.HeadSide

- type: entity
  parent: [ OrganBaseArmLeft, ADTOrganUrsusExternal ]
  id: ADTOrganUrsusArmLeft

- type: entity
  parent: [ OrganBaseArmRight, ADTOrganUrsusExternal ]
  id: ADTOrganUrsusArmRight

- type: entity
  parent: [ OrganBaseHandLeft, ADTOrganUrsusExternal ]
  id: ADTOrganUrsusHandLeft

- type: entity
  parent: [ OrganBaseHandRight, ADTOrganUrsusExternal ]
  id: ADTOrganUrsusHandRight

- type: entity
  parent: [ OrganBaseLegLeft, ADTOrganUrsusExternal ]
  id: ADTOrganUrsusLegLeft

- type: entity
  parent: [ OrganBaseLegRight, ADTOrganUrsusExternal ]
  id: ADTOrganUrsusLegRight

- type: entity
  parent: [ OrganBaseFootLeft, ADTOrganUrsusExternal ]
  id: ADTOrganUrsusFootLeft

- type: entity
  parent: [ OrganBaseFootRight, ADTOrganUrsusExternal ]
  id: ADTOrganUrsusFootRight

- type: entity
  parent: [ OrganBaseBrain, ADTOrganUrsusInternal ]
  id: ADTOrganUrsusBrain

- type: entity
  parent: [ OrganBaseTongue, OrganSpriteHumanInternal, ADTOrganUrsusInternal ]
  id: ADTOrganUrsusTongue

- type: entity
  parent: [ OrganBaseAppendix, OrganSpriteHumanInternal, ADTOrganUrsusInternal ]
  id: ADTOrganUrsusAppendix

- type: entity
  parent: [ OrganBaseEars, OrganSpriteHumanInternal, ADTOrganUrsusInternal ]
  id: ADTOrganUrsusEars

- type: entity
  parent: [ OrganBaseLungs, ADTOrganUrsusInternal, ADTOrganUrsusMetabolizer ]
  id: ADTOrganUrsusLungs

- type: entity
  parent: [ OrganBaseHeart, ADTOrganUrsusInternal, ADTOrganUrsusMetabolizer ]
  id: ADTOrganUrsusHeart

- type: entity
  parent: [ OrganBaseStomach, ADTOrganUrsusInternal, ADTOrganUrsusMetabolizer ]
  id: ADTOrganUrsusStomach

- type: entity
  parent: [ OrganBaseLiver, ADTOrganUrsusInternal, ADTOrganUrsusMetabolizer ]
  id: ADTOrganUrsusLiver

- type: entity
  parent: [ OrganBaseKidneys, ADTOrganUrsusInternal, ADTOrganUrsusMetabolizer ]
  id: ADTOrganUrsusKidneys

- type: entity
  parent: [ OrganHumanEyes, ADTOrganUrsusInternal ]
  id: ADTOrganUrsusEyes
