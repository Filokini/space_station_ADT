# Ursus appearance + visual organs (upstream PR#42476). parts.rsi only (sexed); internals reused from Human.
# markingsGroup "Ursus" defined in ADT/Body/markingsGroups.yml

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceUrsus
  categories: [ HideSpawnMenu ]
  name: ursus appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganUrsusTorso
      Head: OrganUrsusHead
      ArmLeft: OrganUrsusArmLeft
      ArmRight: OrganUrsusArmRight
      HandRight: OrganUrsusHandRight
      HandLeft: OrganUrsusHandLeft
      LegLeft: OrganUrsusLegLeft
      LegRight: OrganUrsusLegRight
      FootLeft: OrganUrsusFootLeft
      FootRight: OrganUrsusFootRight
      Brain: OrganUrsusBrain
      Eyes: OrganUrsusEyes
      Tongue: OrganUrsusTongue
      Appendix: OrganUrsusAppendix
      Ears: OrganUrsusEars
      Lungs: OrganUrsusLungs
      Heart: OrganUrsusHeart
      Stomach: OrganUrsusStomach
      Liver: OrganUrsusLiver
      Kidneys: OrganUrsusKidneys
  - type: HumanoidProfile
    species: UrsusSpecies
  - type: ScaleVisuals
    scale: 1.03, 1.03
  - type: Inventory
    speciesId: urs
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female

- type: entity
  parent: OrganBaseOrganic
  id: OrganUrsus
  abstract: true
  suffix: ursus

- type: entity
  parent: OrganUrsus
  id: OrganUrsusInternal
  abstract: true
  components:
  - type: Sprite
    sprite: ADT/Mobs/Species/Ursus/organs.rsi

- type: entity
  id: OrganUrsusMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Animal ]

- type: entity
  id: OrganUrsusVisual
  abstract: true
  components:
  - type: VisualOrgan
    data:
      sprite: ADT/Mobs/Species/Ursus/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Ursus

- type: entity
  parent: [ OrganUrsus, OrganUrsusVisual ]
  id: OrganUrsusExternal
  abstract: true
  components:
  - type: Sprite
    sprite: ADT/Mobs/Species/Ursus/parts.rsi

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, OrganUrsusExternal ]
  id: OrganUrsusTorso

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, OrganUrsusExternal ]
  id: OrganUrsusHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.Snout
    - enum.HumanoidVisualLayers.HeadTop
    - enum.HumanoidVisualLayers.HeadSide

- type: entity
  parent: [ OrganBaseArmLeft, OrganUrsusExternal ]
  id: OrganUrsusArmLeft

- type: entity
  parent: [ OrganBaseArmRight, OrganUrsusExternal ]
  id: OrganUrsusArmRight

- type: entity
  parent: [ OrganBaseHandLeft, OrganUrsusExternal ]
  id: OrganUrsusHandLeft

- type: entity
  parent: [ OrganBaseHandRight, OrganUrsusExternal ]
  id: OrganUrsusHandRight

- type: entity
  parent: [ OrganBaseLegLeft, OrganUrsusExternal ]
  id: OrganUrsusLegLeft

- type: entity
  parent: [ OrganBaseLegRight, OrganUrsusExternal ]
  id: OrganUrsusLegRight

- type: entity
  parent: [ OrganBaseFootLeft, OrganUrsusExternal ]
  id: OrganUrsusFootLeft

- type: entity
  parent: [ OrganBaseFootRight, OrganUrsusExternal ]
  id: OrganUrsusFootRight

- type: entity
  parent: [ OrganBaseBrain, OrganUrsusInternal ]
  id: OrganUrsusBrain

- type: entity
  parent: [ OrganBaseTongue, OrganSpriteHumanInternal, OrganUrsusInternal ]
  id: OrganUrsusTongue

- type: entity
  parent: [ OrganBaseAppendix, OrganSpriteHumanInternal, OrganUrsusInternal ]
  id: OrganUrsusAppendix

- type: entity
  parent: [ OrganBaseEars, OrganSpriteHumanInternal, OrganUrsusInternal ]
  id: OrganUrsusEars

- type: entity
  parent: [ OrganBaseLungs, OrganUrsusInternal, OrganUrsusMetabolizer ]
  id: OrganUrsusLungs

- type: entity
  parent: [ OrganBaseHeart, OrganUrsusInternal, OrganUrsusMetabolizer ]
  id: OrganUrsusHeart

- type: entity
  parent: [ OrganBaseStomach, OrganUrsusInternal, OrganAnimalMetabolizer ]
  id: OrganUrsusStomach

- type: entity
  parent: [ OrganBaseLiver, OrganUrsusInternal, OrganAnimalMetabolizer ]
  id: OrganUrsusLiver

- type: entity
  parent: [ OrganBaseKidneys, OrganUrsusInternal, OrganAnimalMetabolizer ]
  id: OrganUrsusKidneys

- type: entity
  parent: [ OrganHumanEyes, OrganUrsusInternal ]
  id: OrganUrsusEyes
