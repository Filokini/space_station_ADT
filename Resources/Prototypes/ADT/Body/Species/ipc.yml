# IPC appearance + visual organs (upstream PR#42476). IPC is silicon (non-organic), but the new
# render pipeline needs visual organs to populate body layers. Only external visual organs are
# defined (no biological internals). markingsGroup "Ipc" in ADT/Body/markingsGroups.yml.

# Appearance used as dollPrototype (character editor). The in-game silicon mob (BaseMobIPC in
# ADT/Entities/Mobs/Player/silicon_base.yml) gets the same InitialBody added directly.
- type: entity
  parent: BaseSpeciesAppearance
  id: ADTAppearanceIPC
  categories: [ HideSpawnMenu ]
  name: ipc appearance
  components:
  - type: InitialBody
    organs:
      Torso: ADTOrganIPCTorso
      Head: ADTOrganIPCHead
      ArmLeft: ADTOrganIPCArmLeft
      ArmRight: ADTOrganIPCArmRight
      HandRight: ADTOrganIPCHandRight
      HandLeft: ADTOrganIPCHandLeft
      LegLeft: ADTOrganIPCLegLeft
      LegRight: ADTOrganIPCLegRight
      FootLeft: ADTOrganIPCFootLeft
      FootRight: ADTOrganIPCFootRight
      Brain: ADTOrganIPCBrain
      Eyes: ADTOrganIPCEyes
  - type: HumanoidProfile
    species: IPC
  - type: Inventory
    templateId: ipc
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female

- type: entity
  parent: OrganBaseOrganic
  id: ADTOrganIPC
  abstract: true
  suffix: ipc

- type: entity
  parent: ADTOrganIPC
  id: ADTOrganIPCExternal
  abstract: true
  components:
  - type: Sprite
    sprite: ADT/Mobs/Species/IPC/parts.rsi
  - type: GibbableOrgan
  - type: VisualOrgan
    data:
      sprite: ADT/Mobs/Species/IPC/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Ipc

- type: entity
  parent: [ OrganBaseTorso, ADTOrganIPCExternal ]
  id: ADTOrganIPCTorso

- type: entity
  parent: [ OrganBaseHead, ADTOrganIPCExternal ]
  id: ADTOrganIPCHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.HeadTop
    - enum.HumanoidVisualLayers.HeadSide

- type: entity
  parent: [ OrganBaseArmLeft, ADTOrganIPCExternal ]
  id: ADTOrganIPCArmLeft

- type: entity
  parent: [ OrganBaseArmRight, ADTOrganIPCExternal ]
  id: ADTOrganIPCArmRight

- type: entity
  parent: [ OrganBaseHandLeft, ADTOrganIPCExternal ]
  id: ADTOrganIPCHandLeft

- type: entity
  parent: [ OrganBaseHandRight, ADTOrganIPCExternal ]
  id: ADTOrganIPCHandRight

- type: entity
  parent: [ OrganBaseLegLeft, ADTOrganIPCExternal ]
  id: ADTOrganIPCLegLeft

- type: entity
  parent: [ OrganBaseLegRight, ADTOrganIPCExternal ]
  id: ADTOrganIPCLegRight

- type: entity
  parent: [ OrganBaseFootLeft, ADTOrganIPCExternal ]
  id: ADTOrganIPCFootLeft

- type: entity
  parent: [ OrganBaseFootRight, ADTOrganIPCExternal ]
  id: ADTOrganIPCFootRight

- type: entity
  parent: [ OrganBaseBrain, ADTOrganIPC ]
  id: ADTOrganIPCBrain
  components:
  - type: Sprite
    sprite: Objects/Specific/Robotics/mmi.rsi
    layers:
    - state: posibrain
      map: ["base"]

- type: entity
  parent: [ OrganBase ]
  id: ADTOrganIPCEyes
  components:
  - type: Sprite
    sprite: Objects/Misc/proximity_sensor.rsi
    state: icon
