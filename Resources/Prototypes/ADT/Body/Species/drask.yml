- type: entity
  parent: BaseSpeciesAppearance
  id: ADTAppearanceDrask
  categories: [ HideSpawnMenu ]
  name: drask appearance
  components:
  - type: InitialBody
    organs:
      Torso: ADTOrganDraskTorso
      Head: ADTOrganDraskHead
      ArmLeft: ADTOrganDraskArmLeft
      ArmRight: ADTOrganDraskArmRight
      HandRight: ADTOrganDraskHandRight
      HandLeft: ADTOrganDraskHandLeft
      LegLeft: ADTOrganDraskLegLeft
      LegRight: ADTOrganDraskLegRight
      FootLeft: ADTOrganDraskFootLeft
      FootRight: ADTOrganDraskFootRight
      Brain: ADTOrganDraskBrain
      Eyes: ADTOrganDraskEyes
      Tongue: ADTOrganDraskTongue
      Appendix: ADTOrganDraskAppendix
      Ears: ADTOrganDraskEars
      Lungs: ADTOrganDraskLungs
      Heart: ADTOrganDraskHeart
      Stomach: ADTOrganDraskStomach
      Liver: ADTOrganDraskLiver
      Kidneys: ADTOrganDraskKidneys
  - type: HumanoidProfile
    species: DraskSpecies
  - type: ScaleVisuals
    scale: 1.07, 1.07
  - type: Inventory
    speciesId: drask

- type: entity
  parent: OrganBaseOrganic
  id: ADTOrganDrask
  abstract: true
  suffix: drask

- type: entity
  id: ADTOrganDraskMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Drask ]

- type: entity
  parent: ADTOrganDrask
  id: ADTOrganDraskInternal
  abstract: true
  components:
  - type: Sprite
    sprite: ADT/Mobs/Species/Drask/organs.rsi

- type: entity
  id: ADTOrganDraskVisual
  abstract: true
  components:
  - type: VisualOrgan
    data:
      sprite: ADT/Mobs/Species/Drask/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Drask

- type: entity
  parent: [ ADTOrganDrask, ADTOrganDraskVisual ]
  id: ADTOrganDraskExternal
  abstract: true
  components:
  - type: Sprite
    sprite: ADT/Mobs/Species/Drask/parts.rsi

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, ADTOrganDraskExternal ]
  id: ADTOrganDraskTorso

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, ADTOrganDraskExternal ]
  id: ADTOrganDraskHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.SnoutOverlay
    - enum.HumanoidVisualLayers.SnoutCover
    - enum.HumanoidVisualLayers.HeadTop
    - enum.HumanoidVisualLayers.HeadSide

- type: entity
  parent: [ OrganBaseArmLeft, ADTOrganDraskExternal ]
  id: ADTOrganDraskArmLeft

- type: entity
  parent: [ OrganBaseArmRight, ADTOrganDraskExternal ]
  id: ADTOrganDraskArmRight

- type: entity
  parent: [ OrganBaseHandLeft, ADTOrganDraskExternal ]
  id: ADTOrganDraskHandLeft

- type: entity
  parent: [ OrganBaseHandRight, ADTOrganDraskExternal ]
  id: ADTOrganDraskHandRight

- type: entity
  parent: [ OrganBaseLegLeft, ADTOrganDraskExternal ]
  id: ADTOrganDraskLegLeft

- type: entity
  parent: [ OrganBaseLegRight, ADTOrganDraskExternal ]
  id: ADTOrganDraskLegRight

- type: entity
  parent: [ OrganBaseFootLeft, ADTOrganDraskExternal ]
  id: ADTOrganDraskFootLeft

- type: entity
  parent: [ OrganBaseFootRight, ADTOrganDraskExternal ]
  id: ADTOrganDraskFootRight

- type: entity
  parent: [ OrganBaseBrain, ADTOrganDraskInternal ]
  id: ADTOrganDraskBrain

- type: entity
  parent: [ OrganBaseTongue, ADTOrganDraskInternal ]
  id: ADTOrganDraskTongue

- type: entity
  parent: [ OrganBaseAppendix, ADTOrganDraskInternal ]
  id: ADTOrganDraskAppendix

- type: entity
  parent: [ OrganBaseEars, ADTOrganDraskInternal]
  id: ADTOrganDraskEars

- type: entity
  parent: [ OrganBaseLungs, ADTOrganDraskInternal, ADTOrganDraskMetabolizer ]
  id: ADTOrganDraskLungs

- type: entity
  parent: [ OrganBaseHeart, ADTOrganDraskInternal, ADTOrganDraskMetabolizer ]
  id: ADTOrganDraskHeart

- type: entity
  parent: [ OrganBaseStomach, ADTOrganDraskInternal, ADTOrganDraskMetabolizer ]
  id: ADTOrganDraskStomach

- type: entity
  parent: [ OrganBaseLiver, ADTOrganDraskInternal ]
  id: ADTOrganDraskLiver

- type: entity
  parent: [ OrganBaseKidneys, ADTOrganDraskInternal ]
  id: ADTOrganDraskKidneys

# Drask have glowing (unshaded) eyes drawn from the dedicated "eyes" state in parts.rsi.
- type: entity
  parent: [ ADTOrganDraskVisual, OrganBaseEyes, ADTOrganDraskInternal ]
  id: ADTOrganDraskEyes
  suffix: drask
  components:
  - type: VisualOrgan
    data:
      sprite: ADT/Mobs/Species/Drask/parts.rsi
      state: eyes
      shader: unshaded
  - type: Sprite
    sprite: ADT/Mobs/Species/Drask/organs.rsi
    layers:
    - state: eyeball-l
    - state: eyeball-r
    - state: eyeball-c
